<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio | Tito Halfian</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <nav>
        <div class="logo">Portofolio.</div>
        <ul>
            <li><a href="#profil">Profil</a></li>
            <li><a href="#pengalaman">Pengalaman & Pendidikan</a></li>
            <li><a href="#proyek">Proyek</a></li>
        </ul>
    </nav>

    <!-- Tempat Data Profil -->
	<!-- Bagian Profil Utama -->
    <header id="profil">
        <div class="profil-container">
            <!-- Sisi Kiri: Foto -->
            <div class="profil-kiri">
                <img src="images/profile.jpeg" alt="Foto Profil" class="foto-profil">
            </div>
            
           <!-- Sisi Kanan: Teks & Tombol -->
            <div class="profil-kanan">
                <h1 id="nama-user">Memuat...</h1>
                <h2 id="title-user"></h2>
                <p id="deskripsi-user"></p>
                
                <!-- Bar Keahlian Teknis -->
                <div class="keahlian-profil">
                    <div class="bar-item">
                        <span class="label-keahlian">Internet of Things (ESP32 & Node-RED)</span>
                        <div class="bar-latar"><div class="bar-isi" style="width: 90%;"></div></div>
                    </div>
                    <div class="bar-item">
                        <span class="label-keahlian">SCADA, HMI & PLC Automation</span>
                        <div class="bar-latar"><div class="bar-isi" style="width: 85%;"></div></div>
                    </div>
                    <div class="bar-item">
                        <span class="label-keahlian">Sistem Kendali & Analisis Data (MATLAB)</span>
                        <div class="bar-latar"><div class="bar-isi" style="width: 80%;"></div></div>
                    </div>
                </div>

                <!-- Bungkusan untuk menyejajarkan tombol CV dan Ikon Email -->
				<div class="aksi-profil">
                    <a href="CV.pdf" download class="btn-download">Unduh CV</a>
                    
                    <a id="link-email-profil" href="" class="ikon-email-animasi" title="Kirim Email ke Saya">
                        <i class="fas fa-envelope"></i>
                    </a>

                    <a id="link-linkedin-profil" href="" target="_blank" class="ikon-linkedin-animasi" title="Kunjungi LinkedIn Saya">
                        <i class="fab fa-linkedin-in"></i>
                    </a>
                </div>
            </div>
    </header>

    <section id="pengalaman" class="bagian-abu">
        <div class="container-dua-kolom">
            <!-- Tempat Data Pengalaman -->
            <div class="kolom" id="wadah-pengalaman">
                <h3>Pengalaman.</h3>
                <!-- Data JSON akan dimuat ke sini -->
            </div>

            <!-- Tempat Data Pendidikan -->
            <div class="kolom" id="wadah-pendidikan">
                <h3>Pendidikan</h3>
                <!-- Data JSON akan dimuat ke sini -->
            </div>
        </div>
    </section>

    <section id="proyek">
        <h3>Proyek Riset & Pengembangan</h3>
        <!-- Tempat Data Proyek -->
        <div class="grid-proyek" id="wadah-proyek">
            <!-- Data JSON akan dimuat ke sini -->
        </div>
    </section>

   <!-- Bagian Footer / Kontak -->
    <footer id="kontak">
        <h3>Hubungi Saya</h3>
        <p id="lokasi-user"></p>
        
        <div class="kontak-links">
            <!-- Tombol Email -->
            <a id="link-email" href="" class="tombol-kontak">
                <i class="fas fa-envelope"></i> <span id="email-user"></span>
            </a>
            
            <!-- Tombol Telepon/WA -->
            <a id="link-telepon" href="" class="tombol-kontak">
                <i class="fas fa-phone"></i> <span id="telepon-user"></span>
            </a>
        </div>
        
        <p class="copyright">&copy; 2026 Tito Halfian.</p>
    </footer>

    <!-- Memanggil file JavaScript di bagian paling bawah -->
    <script src="script.js"></script>
</body>
</html>
